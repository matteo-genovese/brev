# Brev Docker Compose
#
# Copy .env.example to .env, set JWT_SECRET and DB_PASSWORD, then run:
#   docker compose up -d

services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    volumes:
      - ${BREV_DATA:-./data}/pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-brev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-brev}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - brev_net

  backend:
    image: ${BACKEND_IMAGE:-brev-backend:local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic -c /app/alembic.ini upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-brev}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DEFAULT_DOMAIN: ${DEFAULT_DOMAIN:-brevl.ink}
      CNAME_TARGET: ${CNAME_TARGET:-proxy.brevl.ink.}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      DOCS_ENABLED: ${DOCS_ENABLED:-false}
      CLOUD_MODE: ${CLOUD_MODE:-false}
      REQUIRE_VERIFIED_EMAIL: ${REQUIRE_VERIFIED_EMAIL:-false}
      FREE_CUSTOM_DOMAINS: ${FREE_CUSTOM_DOMAINS:-0}
      DEBUG: ${BREV_DEBUG:-false}
      CORS_ORIGINS: '${CORS_ORIGINS:-["https://brevl.ink","https://app.brevl.ink"]}'
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-https://brevl.ink/app/dashboard?billing=success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-https://brevl.ink/app/dashboard?billing=cancelled}
    networks:
      - brev_net

  landing:
    image: ${LANDING_IMAGE:-brev-landing:local}
    build:
      context: ./landing
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - brev_net

  dashboard:
    image: ${DASHBOARD_IMAGE:-brev-dashboard:local}
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - brev_net

  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    configs:
      - source: brev_caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - ${BREV_DATA:-./data}/caddy_data:/data
      - ${BREV_DATA:-./data}/caddy_config:/config
    environment:
      DEFAULT_DOMAIN: ${DEFAULT_DOMAIN:-brevl.ink}
      CADDY_EMAIL: ${CADDY_EMAIL:-}
    depends_on:
      - backend
      - landing
      - dashboard
    networks:
      - brev_net

configs:
  brev_caddyfile:
    content: |
      :80 {
        handle /api/* {
          reverse_proxy backend:8000
        }

        handle /docs {
          reverse_proxy backend:8000
        }

        handle /redoc {
          reverse_proxy backend:8000
        }

        handle /openapi.json {
          reverse_proxy backend:8000
        }

        handle /health {
          reverse_proxy backend:8000
        }

        handle_path /app/* {
          reverse_proxy dashboard:80
        }

        handle /app {
          redir /app/ 301
        }

        @short path_regexp short ^/[A-Za-z0-9_-]{3,64}$
        handle @short {
          reverse_proxy backend:8000
        }

        handle {
          reverse_proxy landing:80
        }
      }

networks:
  brev_net:
    name: ${BREV_NETWORK_NAME:-brev_net}
