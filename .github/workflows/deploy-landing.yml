name: Deploy Landing

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'Dockerfile.landing'
      - '.github/workflows/deploy-landing.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: matteo-genovese/brev-landing

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.landing
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Trigger Portainer redeploy
        if: github.ref == 'refs/heads/main'
        run: |
          curl -L -X POST \
            -H "Authorization: Bearer ${{ secrets.PORTAINER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID_LANDING }}/git/redeploy?endpointId=${{ secrets.PORTAINER_ENDPOINT_ID }}" || echo "Portainer redeploy skipped (not configured)"